<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ALFA SAT</title>
    <meta name="description"
        content="Your ALFA SAT dashboard. Access practice tests, view scores, and track your Digital SAT progress.">
    <meta name="robots" content="noindex, nofollow">

    <!-- +++ ADDED: Aggressive Cache Busting +++ -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/style.css?v=2.0?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
    <!-- +++ ADDED: Font Awesome for icons +++ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>

<body class="dashboard-body">

    <header class="main-header">
        <div class="header-content">
            <div class="brand">
                <img src="assets/logo.png" alt="ALFA SAT Logo" class="logo-small">
                <span>ALFA SAT</span>
            </div>
            <nav>
                <!-- +++ Profile Menu +++ -->
                <div class="profile-nav">
                    <button class="btn-icon" id="profile-btn" title="Profile">
                        <i class="fa-solid fa-user-circle"></i>
                    </button>

                    <div class="profile-menu" id="profile-menu">
                        <div class="user-id-display-container">
                            <label for="user-id-display">Your User ID</label>
                            <div class="user-id-input-wrapper">
                                <input type="text" id="user-id-display" value="Loading..." readonly>
                                <button class="btn-icon" id="copy-uid-btn" title="Copy ID">
                                    <i class="fa-regular fa-copy"></i>
                                </button>
                            </div>
                            <small>Give this ID to your admin for private test access.</small>
                        </div>
                        <button class="btn-logout" id="profile-logout-btn">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i>
                            Log Out
                        </button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="welcome-section">
            <h2>Welcome back, Student!</h2>
            <p>Ready to ace your test? Pick a practice test below to get started.</p>
        </div>

        <div class="test-code-section">
            <form id="test-code-form">
                <input type="text" placeholder="Enter 6-digit code (e.g. 123-456)" maxlength="7"
                    class="test-code-input">
                <button type="submit" class="btn btn-secondary">Start Proctored Test</button>
            </form>
        </div>

        <!-- Filter Tabs -->
        <div class="dashboard-filters" id="dashboard-filters">
            <button class="filter-btn active" data-filter="all">
                <i class="fa-solid fa-layer-group"></i> All Tests <span class="filter-count" id="count-all">0</span>
            </button>
            <button class="filter-btn" data-filter="real_exam">
                <i class="fa-solid fa-file-lines"></i> Real Exams <span class="filter-count" id="count-real-exam">0</span>
            </button>
            <button class="filter-btn" data-filter="premium">
                <i class="fa-solid fa-crown"></i> Premium <span class="filter-count" id="count-premium">0</span>
            </button>
            <button class="filter-btn" data-filter="finished">
                <i class="fa-solid fa-check-circle"></i> Finished <span class="filter-count" id="count-finished">0</span>
            </button>
        </div>

        <!-- In Progress Section -->
        <div class="test-section in-progress-section" id="in-progress-section" style="display: none;">
            <div class="section-header-row">
                <h3><i class="fa-solid fa-fire"></i> Continue Where You Left Off</h3>
            </div>
            <div class="test-grid" id="in-progress-grid"></div>
        </div>

        <!-- Real Exam Tests Section (FREE) -->
        <div class="test-section real-exam-section" id="real-exam-section" style="display: none;">
            <div class="section-header-row">
                <h3><i class="fa-solid fa-file-lines"></i> Real Exam Tests</h3>
                <span class="section-badge free-badge">FREE</span>
            </div>
            <div class="test-grid" id="real-exam-grid"></div>
        </div>

        <!-- Premium Tests Section -->
        <div class="test-section premium-section" id="premium-section" style="display: none;">
            <div class="section-header-row">
                <h3><i class="fa-solid fa-crown"></i> Premium Tests</h3>
            </div>
            <div class="test-grid" id="premium-grid"></div>
        </div>

        <!-- General/Other Tests -->
        <div class="test-section other-section" id="other-section" style="display: none;">
            <div class="section-header-row">
                <h3><i class="fa-solid fa-dumbbell"></i> Practice Tests</h3>
            </div>
            <div class="test-grid" id="other-grid"></div>
        </div>

        <!-- Finished Tests Section (Recent Results) -->
        <div class="test-section finished-section" id="finished-section" style="display: none;">
            <div class="section-header-row">
                <h3><i class="fa-solid fa-check-circle"></i> Recent Results</h3>
            </div>
            <div class="test-grid finished-grid" id="finished-grid"></div>
        </div>

        <!-- Loading / Empty State -->
        <div class="test-list-container" id="loading-container">
            <div class="test-grid" id="test-grid-container">
                <p>Loading available tests...</p>
            </div>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>

    <!-- Our Firebase initialization script -->
    <script src="js/firebase-init.js?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2"></script>

    <!-- Our main script (must be last) -->
    <script src="js/main.js?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2?v=2.2"></script>
</body>

</html>
